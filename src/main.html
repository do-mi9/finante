<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Insight</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="titlecard">Financial Insight</div>

    <div class="maincard">
        <div class="card">
            <button class="toggle-btn active" id="btnCheltuieli" onclick="setMode('cheltuieli')">Cheltuieli</button>
            <div class="toggle-row">
                <button class="toggle-btn" id="btnVenituri" onclick="setMode('venituri')">Venituri</button>
            </div>
        </div>

        <hr class="divider">

        <div class="actioncard">
            <label>Suma</label>
            <input type="number" placeholder="0" id="sumaInput" min="0">
        </div>

        <div class="actioncard">
            <label>Categorie</label>
            <select id="categorieSelect"></select>
        </div>

        <div class="actioncard">
            <label>Descriere <span class="optional">(opțional)</span></label>
            <input type="text" placeholder="Ex: Mâncare, chirie, etc." id="descriereInput">
        </div>
        
        <div class="actioncard">
            <label>Data</label>
            <input type="date" id="dataInput">
        </div>


        <button class="adaugacard" onclick="adaugaInregistrare()">+ Adaugă cheltuială</button>

        <hr class="divider">

        <div class="total-row">Total: <span id="totalContainer">0 MDL</span></div>

        <div class="listcard">
            <ul id="listaIntrari">
                <li>Nu sunt cheltuieli înregistrate</li>
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
