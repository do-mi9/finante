<!DOCTYPE html>
<html lang="ro">
    <head>
        <meta charset="UTF-8">
        <title>Financial Insight</title>
        <link rel="stylesheet" href="style.css">
    </head>    
<body style="background-color: rgb(255, 255, 255);"></body>
    <div class="titlecard">
        Financial Insight
    </div>
    <div  class="maincard">
        <div class="cheltuielicard">
        Cheltuieli
        </div>
         <div class="row">
        <div class="smallcard">
        Venituri
        </div>
        <div class="smallcard">
        Buget
        </div>
        </div>
        <hr style="width: 97%; margin: 5px; color: #a0bfc6;">
        <div class="actioncard">
        <label> Suma </label>
        <input type="number" placeholder="0" id="sumaInput">
        </div>
        <div class="actioncard">
        <label > Categorie </label>
        <select id="categorieSelect" name="categorie" >
        <option value="0"> Select option</option>
        <option value="1">Alimentație</option>
        <option value="2">Chirie</option>
        <option value="3">Transport</option>
        <option value="4">Educație</option>
        <option value="5">Shopping</option>
        <option value="6">Sănătate</option>
        <option value="7">Divertisment</option>
        <option value="8">Economii</option>
        <option value="9">Servicii Comunale</option>
        </select>
    </div>
    <div class="actioncard">
        <label> Descriere </label>
        <input type="text" class="actioncard" placeholder="Ex: Mâncare, chirie, etc." id="descriereInput">
  </div>
    
     <div class="adaugacard">
    + Adaugă cheltuieli
     </div>
    <hr style="width: 97%; margin: 10px; color: #a0bfc6;">
    <div> 
        Total intrari: <span id="totalIntrari">0</span>
    </div>
    <div class="listcard" id="listcard">
        <ul>
            <li>Nu sunt cheltuieli înregistrate</li>
        </ul>
    </div>
    
  </div>
  <script src="script.js"></script>
</body>
</html>
